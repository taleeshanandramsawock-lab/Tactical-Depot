<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Depot - Order Form</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Tactical Depot</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form Section -->
    <section class="form-section py-5">
        <div class="container">
            
            <!-- Page Title -->
            <h2 class="text-center mb-5">Customer Entry Form</h2>
            
            <!-- Form Card -->
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card p-4">
                        
                        <!-- Order Form -->
                        <form>
                            
                            <!-- Customer Name Dropdown -->
                            <div class="mb-3">
                                <label for="customerName" class="form-label">Customer Name</label>
                                <select class="form-select" id="customerName">
                                    <option selected>Click to select</option>
                                    <option value="1">John Doe</option>
                                    <option value="2">Jane Smith</option>
                                    <option value="3">Mike Johnson</option>
                                    <option value="4">Sarah Williams</option>
                                </select>
                            </div>
                            
                            <!-- Product Dropdown -->
                            <div class="mb-3">
                                <label for="product" class="form-label">Product</label>
                                <select class="form-select" id="product">
                                    <option selected>Click to select</option>
                                    <option value="1">AK-47</option>
                                    <option value="2">Sniper Rifle</option>
                                    <option value="3">Tactical Pistol</option>
                                    <option value="4">M-4 Carbine</option>
                                    <option value="5">Ammo Box</option>
                                </select>
                            </div>
                            
                            <!-- Quantity Dropdown -->
                            <div class="mb-3">
                                <label for="quantity" class="form-label">Quantity</label>
                                <select class="form-select" id="quantity">
                                    <option selected>Click to select</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">10</option>
                                </select>
                            </div>
                            
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-danger w-100">Submit</button>
                            
                        </form>
                    </div>
                </div>
            </div>
            
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 Tactical Depot. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
